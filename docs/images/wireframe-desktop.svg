  <text x="380" y="930" font-size="10" font-weight="600" fill="#6B7280">Due Date *</text>
  <rect x="380" y="936" width="140" height="28" rx="5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
