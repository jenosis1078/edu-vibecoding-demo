  <rect x="80" y="742" width="940" height="50" fill="url(#headerGrad)"/>
  <text x="110" y="773" font-size="18" font-weight="700" fill="#FFFFFF">TODO App</text>
  <text x="870" y="770" font-size="11" fill="#DBEAFE">user@email.com</text>
  <rect x="945" y="758" width="60" height="26" rx="4" fill="#FFFFFF" fill-opacity="0.2"/>
  <text x="975" y="775" text-anchor="middle" font-size="10" font-weight="600" fill="#FFFFFF">Logout</text>

  <!-- New TODO Form Card -->
  <rect x="110" y="810" width="880" height="160" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="130" y="835" font-size="14" font-weight="700" fill="#1E293B">New TODO</text>
  <line x1="110" y1="845" x2="990" y2="845" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Title input -->
  <text x="130" y="870" font-size="10" font-weight="600" fill="#6B7280">Title *</text>
  <rect x="130" y="876" width="400" height="32" rx="5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="142" y="896" font-size="11" fill="#9CA3AF">Enter title...</text>

  <!-- Description input -->
  <text x="550" y="870" font-size="10" font-weight="600" fill="#6B7280">Description</text>
  <rect x="550" y="876" width="420" height="32" rx="5" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="562" y="896" font-size="11" fill="#9CA3AF">Enter description...</text>

