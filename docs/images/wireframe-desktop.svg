  <!-- Content -->
  <text x="185" y="1072" font-size="14" font-weight="600" fill="#1E293B">Write project proposal</text>
  <text x="185" y="1092" font-size="11" fill="#6B7280">Draft the initial project proposal document for Q2</text>
  <!-- Priority badge -->
