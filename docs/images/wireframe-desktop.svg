  <text x="130" y="930" font-size="10" font-weight="600" fill="#6B7280">Priority</text>
  <!-- High -->
  <circle cx="142" cy="948" r="7" fill="#FFFFFF" stroke="#DC2626" stroke-width="2"/>
  <circle cx="142" cy="948" r="3.5" fill="#DC2626"/>
  <text x="156" y="952" font-size="10" fill="#374151">High</text>
  <!-- Medium -->
  <circle cx="202" cy="948" r="7" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
  <text x="216" y="952" font-size="10" fill="#374151">Medium</text>
