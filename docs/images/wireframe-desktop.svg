  <rect x="110" y="1045" width="880" height="75" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Checkbox -->
  <rect x="130" y="1070" width="20" height="20" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
