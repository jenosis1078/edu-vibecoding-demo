<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="1500" fill="#F1F5F9"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1E293B">Desktop View Wireframes (1280px)</text>
  <text x="550" y="62" text-anchor="middle" font-size="13" fill="#64748B">TODO Web App - UI Design</text>

  <!-- ============================================ -->
  <!-- SCREEN 1: Login / Sign Up -->
  <!-- ============================================ -->
  <text x="80" y="105" font-size="16" font-weight="700" fill="#475569">Screen 1: Login / Sign Up</text>
  <line x1="80" y1="112" x2="1020" y2="112" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Browser frame -->
  <rect x="80" y="125" width="940" height="520" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <!-- Browser bar -->
  <rect x="80" y="125" width="940" height="32" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="80" y="149" width="940" height="4" fill="#F3F4F6"/>
  <circle cx="100" cy="141" r="5" fill="#FCA5A5"/>
  <circle cx="116" cy="141" r="5" fill="#FDE68A"/>
  <circle cx="132" cy="141" r="5" fill="#86EFAC"/>
  <rect x="200" y="133" width="300" height="16" rx="4" fill="#E5E7EB"/>
  <text x="350" y="145" text-anchor="middle" font-size="9" fill="#9CA3AF">https://todo-app.github.io</text>

  <!-- Center card -->
  <rect x="350" y="210" width="400" height="390" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- App title -->
  <rect x="390" y="235" width="320" height="40" rx="6" fill="#EFF6FF"/>
  <text x="550" y="261" text-anchor="middle" font-size="20" font-weight="700" fill="#2563EB">TODO App</text>

  <!-- Tab: Login / Sign Up -->
  <rect x="390" y="295" width="155" height="32" rx="6" fill="#2563EB"/>
  <text x="467" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#FFFFFF">Login</text>
  <rect x="555" y="295" width="155" height="32" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="632" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#64748B">Sign Up</text>

  <!-- Email input -->
  <text x="390" y="356" font-size="11" font-weight="600" fill="#374151">Email</text>
  <rect x="390" y="362" width="320" height="38" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="406" y="386" font-size="12" fill="#9CA3AF">you@example.com</text>

  <!-- Password input -->
  <text x="390" y="420" font-size="11" font-weight="600" fill="#374151">Password</text>
  <rect x="390" y="426" width="320" height="38" rx="6" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1"/>
  <text x="406" y="450" font-size="12" fill="#9CA3AF">&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;</text>

  <!-- Login button -->
  <rect x="390" y="490" width="320" height="42" rx="8" fill="#2563EB"/>
  <text x="550" y="516" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Login</text>

  <!-- Forgot password -->
  <text x="550" y="555" text-anchor="middle" font-size="11" fill="#3B82F6">Forgot password?</text>

  <!-- Error message annotation -->
  <rect x="760" y="365" width="200" height="50" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <text x="770" y="383" font-size="10" font-weight="600" fill="#DC2626">Validation Error</text>
  <text x="770" y="398" font-size="9" fill="#7F1D1D">Invalid email or password</text>
  <text x="770" y="410" font-size="9" fill="#7F1D1D">displayed below input field</text>
  <line x1="710" y1="381" x2="758" y2="385" stroke="#FECACA" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ============================================ -->
  <!-- SCREEN 2: Main - TODO List -->
  <!-- ============================================ -->
  <text x="80" y="690" font-size="16" font-weight="700" fill="#475569">Screen 2: Main - TODO List</text>
  <line x1="80" y1="697" x2="1020" y2="697" stroke="#CBD5E1" stroke-width="1"/>

  <!-- Browser frame -->
  <rect x="80" y="710" width="940" height="760" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <!-- Browser bar -->
  <rect x="80" y="710" width="940" height="32" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
  <rect x="80" y="734" width="940" height="4" fill="#F3F4F6"/>
  <circle cx="100" cy="726" r="5" fill="#FCA5A5"/>
  <circle cx="116" cy="726" r="5" fill="#FDE68A"/>
  <circle cx="132" cy="726" r="5" fill="#86EFAC"/>
  <rect x="200" y="718" width="300" height="16" rx="4" fill="#E5E7EB"/>
  <text x="350" y="730" text-anchor="middle" font-size="9" fill="#9CA3AF">https://todo-app.github.io</text>

