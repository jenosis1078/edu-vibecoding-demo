  <text x="704" y="1074" text-anchor="middle" font-size="9" font-weight="600" fill="#DC2626">HIGH</text>
  <!-- Due date -->
  <rect x="740" y="1060" width="80" height="20" rx="4" fill="#F1F5F9"/>
  <text x="780" y="1074" text-anchor="middle" font-size="9" fill="#64748B">2026-04-15</text>
  <!-- Created -->
  <text x="840" y="1074" font-size="9" fill="#94A3B8">Mar 31</text>
  <!-- Delete button -->
  <rect x="925" y="1065" width="50" height="26" rx="4" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="1"/>
  <text x="950" y="1082" text-anchor="middle" font-size="10" fill="#DC2626">Delete</text>

  <!-- Item 2: Medium priority, completed -->
  <rect x="110" y="1130" width="880" height="75" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Checkbox (checked) -->
