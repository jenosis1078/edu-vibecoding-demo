  <polyline points="135,1166 139,1170 146,1159" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Priority indicator -->
  <rect x="165" y="1140" width="6" height="55" rx="3" fill="#F59E0B"/>
  <!-- Content (strikethrough style - gray) -->
  <text x="185" y="1157" font-size="14" font-weight="600" fill="#94A3B8" text-decoration="line-through">Prepare meeting materials</text>
  <text x="185" y="1177" font-size="11" fill="#CBD5E1" text-decoration="line-through">Weekly meeting presentation prep</text>
  <!-- Priority badge -->
  <rect x="680" y="1145" width="62" height="20" rx="10" fill="#FEF3C7"/>
  <text x="711" y="1159" text-anchor="middle" font-size="9" font-weight="600" fill="#D97706">MEDIUM</text>
  <!-- Due date -->
  <rect x="755" y="1145" width="80" height="20" rx="4" fill="#F1F5F9"/>
  <text x="795" y="1159" text-anchor="middle" font-size="9" fill="#94A3B8">2026-04-10</text>
  <!-- Created -->
  <text x="847" y="1159" font-size="9" fill="#94A3B8">Mar 30</text>
  <!-- Completed badge -->
  <rect x="910" y="1148" width="65" height="20" rx="10" fill="#DCFCE7"/>
  <text x="942" y="1162" text-anchor="middle" font-size="9" font-weight="600" fill="#16A34A">Done</text>

  <!-- Item 3: Low priority, incomplete -->
  <rect x="110" y="1215" width="880" height="75" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Checkbox -->
  <rect x="130" y="1240" width="20" height="20" rx="4" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
  <!-- Priority indicator -->
  <rect x="165" y="1225" width="6" height="55" rx="3" fill="#22C55E"/>
  <!-- Content -->
  <text x="185" y="1242" font-size="14" font-weight="600" fill="#1E293B">Check emails</text>
  <text x="185" y="1262" font-size="11" fill="#6B7280">Process unread emails from this week</text>
  <!-- Priority badge -->
  <rect x="680" y="1230" width="44" height="20" rx="10" fill="#DCFCE7"/>
  <text x="702" y="1244" text-anchor="middle" font-size="9" font-weight="600" fill="#16A34A">LOW</text>
  <!-- Due date -->
  <rect x="740" y="1230" width="80" height="20" rx="4" fill="#F1F5F9"/>
  <text x="780" y="1244" text-anchor="middle" font-size="9" fill="#64748B">2026-04-20</text>
  <!-- Created -->
  <text x="840" y="1244" font-size="9" fill="#94A3B8">Mar 31</text>
  <!-- Delete button -->
  <rect x="925" y="1235" width="50" height="26" rx="4" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="1"/>
  <text x="950" y="1252" text-anchor="middle" font-size="10" fill="#DC2626">Delete</text>

  <!-- Annotations -->
  <!-- Priority color guide -->
  <rect x="110" y="1310" width="880" height="45" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="130" y="1332" font-size="10" font-weight="600" fill="#475569">Priority Colors:</text>
  <circle cx="230" cy="1328" r="6" fill="#DC2626"/>
  <text x="242" y="1332" font-size="10" fill="#374151">High</text>
  <circle cx="290" cy="1328" r="6" fill="#F59E0B"/>
  <text x="302" y="1332" font-size="10" fill="#374151">Medium</text>
  <circle cx="365" cy="1328" r="6" fill="#22C55E"/>
  <text x="377" y="1332" font-size="10" fill="#374151">Low</text>

  <text x="520" y="1332" font-size="10" font-weight="600" fill="#475569">States:</text>
  <rect x="560" y="1318" width="16" height="16" rx="3" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="582" y="1332" font-size="10" fill="#374151">Incomplete</text>
  <rect x="650" y="1318" width="16" height="16" rx="3" fill="#2563EB"/>
  <polyline points="654,1327 657,1330 662,1322" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <text x="672" y="1332" font-size="10" fill="#374151">Completed (text strikethrough)</text>

  <!-- Footer note -->
  <text x="550" y="1390" text-anchor="middle" font-size="11" fill="#94A3B8">Desktop layout: min-width 1024px | Fixed-width centered content</text>

  <!-- Footer -->
  <rect x="110" y="1420" width="880" height="40" rx="0" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="550" y="1445" text-anchor="middle" font-size="10" fill="#94A3B8">TODO App - Desktop Wireframe</text>
</svg>
