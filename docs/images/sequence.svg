<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1320" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#475569"/>
    </marker>
    <marker id="arrowRBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowLBlue" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#3B82F6"/>
    </marker>
    <marker id="arrowRGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#16A34A"/>
    </marker>
    <marker id="arrowLGreen" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#16A34A"/>
    </marker>
    <marker id="arrowRRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#DC2626"/>
    </marker>
    <marker id="arrowLRed" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1320" rx="12" fill="#F8FAFC"/>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#1E293B">TODO Web App - Sequence Diagrams</text>
  <text x="500" y="54" text-anchor="middle" font-size="12" fill="#64748B">Request Processing Flow</text>

  <!-- ============================================ -->
  <!-- Actor Headers -->
  <!-- ============================================ -->
  <!-- X positions: Client=120, Cognito=320, APIGateway=520, Lambda=700, DynamoDB=880 -->

  <!-- Client -->
  <rect x="60" y="74" width="120" height="40" rx="8" fill="#3B82F6" filter="url(#shadow)"/>
  <text x="120" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">Client</text>
  <text x="120" y="128" text-anchor="middle" font-size="9" fill="#64748B">React App</text>

  <!-- Cognito -->
  <rect x="260" y="74" width="120" height="40" rx="8" fill="#DC2626" filter="url(#shadow)"/>
  <text x="320" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">Cognito</text>
  <text x="320" y="128" text-anchor="middle" font-size="9" fill="#64748B">AWS Cognito</text>

  <!-- API Gateway -->
  <rect x="460" y="74" width="120" height="40" rx="8" fill="#7C3AED" filter="url(#shadow)"/>
  <text x="520" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">API Gateway</text>
  <text x="520" y="128" text-anchor="middle" font-size="9" fill="#64748B">REST API</text>

  <!-- Lambda -->
  <rect x="640" y="74" width="120" height="40" rx="8" fill="#D97706" filter="url(#shadow)"/>
  <text x="700" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">Lambda</text>
  <text x="700" y="128" text-anchor="middle" font-size="9" fill="#64748B">Node.js / TS</text>

  <!-- DynamoDB -->
  <rect x="820" y="74" width="120" height="40" rx="8" fill="#1D4ED8" filter="url(#shadow)"/>
  <text x="880" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#FFF">DynamoDB</text>
  <text x="880" y="128" text-anchor="middle" font-size="9" fill="#64748B">Database</text>

  <!-- Lifelines -->
  <line x1="120" y1="135" x2="120" y2="1290" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="320" y1="135" x2="320" y2="1290" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="520" y1="135" x2="520" y2="1290" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="700" y1="135" x2="700" y2="1290" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="880" y1="135" x2="880" y2="1290" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ============================================ -->
  <!-- SECTION 1: Authentication (Login) -->
  <!-- ============================================ -->
  <rect x="20" y="150" width="960" height="230" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <rect x="30" y="142" width="200" height="22" rx="4" fill="#DC2626"/>
  <text x="130" y="157" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">1. Authentication (Login)</text>

  <!-- Step 1: Client -> Cognito: Login request -->
  <line x1="120" y1="190" x2="312" y2="190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="142" y="175" width="148" height="18" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="216" y="188" text-anchor="middle" font-size="10" fill="#1E293B">POST /login (email, pw)</text>

  <!-- Step 2: Cognito validates -->
  <rect x="300" y="205" width="40" height="25" rx="2" fill="#FECACA" opacity="0.5"/>
  <line x1="320" y1="205" x2="320" y2="230" stroke="#DC2626" stroke-width="1.5"/>
  <text x="370" y="221" font-size="9" fill="#64748B" font-style="italic">validate credentials</text>

  <!-- Step 3: Cognito -> Client: JWT tokens -->
  <line x1="312" y1="245" x2="128" y2="245" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <rect x="145" y="233" width="140" height="16" rx="3" fill="#DCFCE7"/>
  <text x="215" y="244" text-anchor="middle" font-size="9" fill="#166534">200 JWT (ID + Access Token)</text>

  <!-- Step 4: Client stores token -->
  <rect x="100" y="260" width="40" height="25" rx="2" fill="#DBEAFE" opacity="0.5"/>
  <line x1="120" y1="260" x2="120" y2="285" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="170" y="276" font-size="9" fill="#64748B" font-style="italic">store token in memory</text>

  <!-- Alt: Invalid credentials -->
  <rect x="40" y="300" width="280" height="35" rx="4" fill="#FFF" stroke="#FCA5A5" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="52" y="313" font-size="9" font-weight="700" fill="#DC2626">[alt] Invalid credentials</text>
  <line x1="312" y1="325" x2="128" y2="325" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLRed)"/>
  <text x="216" y="322" text-anchor="middle" font-size="9" fill="#DC2626">401 Unauthorized</text>

  <!-- Separator note -->
  <rect x="40" y="345" width="260" height="20" rx="3" fill="#FEF3C7" stroke="#FDE68A" stroke-width="0.5"/>
  <text x="170" y="359" text-anchor="middle" font-size="9" fill="#92400E">Token is cached and included in all subsequent API requests</text>

  <!-- ============================================ -->
  <!-- SECTION 2: Create TODO -->
  <!-- ============================================ -->
  <rect x="20" y="390" width="960" height="260" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
  <rect x="30" y="382" width="200" height="22" rx="4" fill="#16A34A"/>
  <text x="130" y="397" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">2. Create TODO (POST /todos)</text>

  <!-- Step 1: Client -> API Gateway -->
  <line x1="120" y1="420" x2="512" y2="420" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="210" y="406" width="210" height="18" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="315" y="419" text-anchor="middle" font-size="10" fill="#1E293B">POST /todos + Bearer Token</text>
  <text x="315" y="436" text-anchor="middle" font-size="9" fill="#64748B">{ title, description, priority, dueDate }</text>

  <!-- Step 2: API Gateway validates token with Cognito -->
  <line x1="520" y1="455" x2="328" y2="455" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowL)"/>
  <text x="420" y="452" text-anchor="middle" font-size="9" fill="#7C3AED">verify JWT token</text>
  <line x1="328" y1="470" x2="512" y2="470" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRGreen)"/>
  <text x="420" y="467" text-anchor="middle" font-size="9" fill="#16A34A">token valid + userId</text>

  <!-- Step 3: API Gateway -> Lambda -->
  <line x1="520" y1="495" x2="692" y2="495" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="555" y="482" width="120" height="16" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="615" y="493" text-anchor="middle" font-size="9" fill="#1E293B">invoke createTodo</text>

  <!-- Step 4: Lambda processes -->
  <rect x="680" y="510" width="40" height="25" rx="2" fill="#FEF3C7" opacity="0.5"/>
  <line x1="700" y1="510" x2="700" y2="535" stroke="#D97706" stroke-width="1.5"/>
  <text x="750" y="524" font-size="9" fill="#64748B" font-style="italic">generate UUID, timestamp</text>

  <!-- Step 5: Lambda -> DynamoDB -->
  <line x1="700" y1="545" x2="872" y2="545" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="740" y="532" width="90" height="16" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="785" y="543" text-anchor="middle" font-size="9" fill="#1E293B">PutItem(todo)</text>

  <!-- Step 6: DynamoDB -> Lambda -->
  <line x1="872" y1="565" x2="708" y2="565" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <text x="790" y="562" text-anchor="middle" font-size="9" fill="#16A34A">200 OK</text>

  <!-- Step 7: Lambda -> API Gateway -> Client -->
  <line x1="692" y1="585" x2="528" y2="585" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <text x="610" y="582" text-anchor="middle" font-size="9" fill="#16A34A">todo object</text>

  <line x1="512" y1="605" x2="128" y2="605" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <rect x="220" y="593" width="180" height="16" rx="3" fill="#DCFCE7"/>
  <text x="310" y="604" text-anchor="middle" font-size="9" fill="#166534">201 { success: true, data: todo }</text>

  <!-- Step 8: Client updates store -->
  <rect x="100" y="618" width="40" height="20" rx="2" fill="#DBEAFE" opacity="0.5"/>
  <line x1="120" y1="618" x2="120" y2="638" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="170" y="632" font-size="9" fill="#64748B" font-style="italic">update Zustand store + localStorage</text>

  <!-- ============================================ -->
  <!-- SECTION 3: Get TODOs -->
  <!-- ============================================ -->
  <rect x="20" y="665" width="960" height="215" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <rect x="30" y="657" width="200" height="22" rx="4" fill="#2563EB"/>
  <text x="130" y="672" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">3. Get TODOs (GET /todos)</text>

  <!-- Step 1: Client -> API Gateway -->
  <line x1="120" y1="695" x2="512" y2="695" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="240" y="682" width="160" height="16" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="320" y="693" text-anchor="middle" font-size="10" fill="#1E293B">GET /todos + Bearer Token</text>

  <!-- Step 2: Token validation (compact) -->
  <line x1="520" y1="715" x2="328" y2="715" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowL)"/>
  <line x1="328" y1="725" x2="512" y2="725" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRGreen)"/>
  <text x="420" y="722" text-anchor="middle" font-size="9" fill="#7C3AED">token verification</text>

  <!-- Step 3: API Gateway -> Lambda -> DynamoDB -->
  <line x1="520" y1="745" x2="692" y2="745" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="610" y="742" text-anchor="middle" font-size="9" fill="#1E293B">invoke getTodos</text>

  <line x1="700" y1="765" x2="872" y2="765" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="730" y="752" width="110" height="16" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="785" y="763" text-anchor="middle" font-size="9" fill="#1E293B">Query(PK=userId)</text>

  <!-- Step 4: DynamoDB -> Lambda -> API Gateway -> Client -->
  <line x1="872" y1="785" x2="708" y2="785" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <text x="790" y="782" text-anchor="middle" font-size="9" fill="#16A34A">items[]</text>

  <line x1="692" y1="805" x2="528" y2="805" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <line x1="512" y1="825" x2="128" y2="825" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <rect x="220" y="813" width="190" height="16" rx="3" fill="#DCFCE7"/>
  <text x="315" y="824" text-anchor="middle" font-size="9" fill="#166534">200 { success: true, data: todos[] }</text>

  <!-- Client-side processing note -->
  <rect x="100" y="840" width="40" height="20" rx="2" fill="#DBEAFE" opacity="0.5"/>
  <line x1="120" y1="840" x2="120" y2="860" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="170" y="854" font-size="9" fill="#64748B" font-style="italic">client-side: search, filter, sort</text>

  <!-- ============================================ -->
  <!-- SECTION 4: Delete TODO -->
  <!-- ============================================ -->
  <rect x="20" y="885" width="960" height="195" rx="8" fill="#FEF2F2" stroke="#FECACA" stroke-width="1"/>
  <rect x="30" y="877" width="220" height="22" rx="4" fill="#DC2626"/>
  <text x="140" y="892" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">4. Delete TODO (DELETE /todos/{id})</text>

  <!-- Step 1: Client -> API Gateway -->
  <line x1="120" y1="915" x2="512" y2="915" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="220" y="902" width="195" height="16" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="318" y="913" text-anchor="middle" font-size="10" fill="#1E293B">DELETE /todos/{id} + Bearer Token</text>

  <!-- Token validation (compact) -->
  <line x1="520" y1="935" x2="328" y2="935" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowL)"/>
  <line x1="328" y1="945" x2="512" y2="945" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRGreen)"/>
  <text x="420" y="942" text-anchor="middle" font-size="9" fill="#7C3AED">token verification</text>

  <!-- API Gateway -> Lambda -> DynamoDB -->
  <line x1="520" y1="965" x2="692" y2="965" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="610" y="962" text-anchor="middle" font-size="9" fill="#1E293B">invoke deleteTodo</text>

  <line x1="700" y1="985" x2="872" y2="985" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="728" y="972" width="118" height="16" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="787" y="983" text-anchor="middle" font-size="9" fill="#1E293B">DeleteItem(userId, id)</text>

  <!-- Response back -->
  <line x1="872" y1="1005" x2="708" y2="1005" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <line x1="692" y1="1020" x2="528" y2="1020" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <line x1="512" y1="1035" x2="128" y2="1035" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <rect x="240" y="1023" width="160" height="16" rx="3" fill="#DCFCE7"/>
  <text x="320" y="1034" text-anchor="middle" font-size="9" fill="#166534">200 { success: true }</text>

  <!-- Client updates -->
  <rect x="100" y="1048" width="40" height="20" rx="2" fill="#DBEAFE" opacity="0.5"/>
  <line x1="120" y1="1048" x2="120" y2="1068" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="170" y="1062" font-size="9" fill="#64748B" font-style="italic">remove from store + localStorage</text>

  <!-- ============================================ -->
  <!-- SECTION 5: Toggle TODO -->
  <!-- ============================================ -->
  <rect x="20" y="1092" width="960" height="190" rx="8" fill="#FDF4FF" stroke="#E9D5FF" stroke-width="1"/>
  <rect x="30" y="1084" width="260" height="22" rx="4" fill="#7C3AED"/>
  <text x="160" y="1099" text-anchor="middle" font-size="11" font-weight="700" fill="#FFF">5. Toggle TODO (PATCH /todos/{id}/toggle)</text>

  <!-- Step 1: Client -> API Gateway -->
  <line x1="120" y1="1120" x2="512" y2="1120" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="205" y="1107" width="220" height="16" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="315" y="1118" text-anchor="middle" font-size="10" fill="#1E293B">PATCH /todos/{id}/toggle + Bearer Token</text>

  <!-- Token validation (compact) -->
  <line x1="520" y1="1140" x2="328" y2="1140" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowL)"/>
  <line x1="328" y1="1150" x2="512" y2="1150" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowRGreen)"/>
  <text x="420" y="1147" text-anchor="middle" font-size="9" fill="#7C3AED">token verification</text>

  <!-- API Gateway -> Lambda -> DynamoDB -->
  <line x1="520" y1="1170" x2="692" y2="1170" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="610" y="1167" text-anchor="middle" font-size="9" fill="#1E293B">invoke toggleTodo</text>

  <line x1="700" y1="1190" x2="872" y2="1190" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="718" y="1177" width="130" height="16" rx="3" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="783" y="1188" text-anchor="middle" font-size="9" fill="#1E293B">UpdateItem(toggle completed)</text>

  <!-- Response back -->
  <line x1="872" y1="1210" x2="708" y2="1210" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <text x="790" y="1207" text-anchor="middle" font-size="9" fill="#16A34A">updated todo</text>

  <line x1="692" y1="1225" x2="528" y2="1225" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <line x1="512" y1="1240" x2="128" y2="1240" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowLGreen)"/>
  <rect x="215" y="1228" width="200" height="16" rx="3" fill="#DCFCE7"/>
  <text x="315" y="1239" text-anchor="middle" font-size="9" fill="#166534">200 { success: true, data: todo }</text>

  <!-- Client updates -->
  <rect x="100" y="1255" width="40" height="20" rx="2" fill="#DBEAFE" opacity="0.5"/>
  <line x1="120" y1="1255" x2="120" y2="1275" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="170" y="1269" font-size="9" fill="#64748B" font-style="italic">update completed status in store</text>

  <!-- ============================================ -->
  <!-- Footer -->
  <!-- ============================================ -->
  <text x="500" y="1308" text-anchor="middle" font-size="10" fill="#94A3B8">All API requests require valid JWT token via Authorization header</text>
</svg>
